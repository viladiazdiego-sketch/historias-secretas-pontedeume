// Función para centrar el mapa en la ubicación del usuario
function toggleFollowUser() {
    const btn = document.getElementById('centerLocationBtn');
    
    if (isFollowingUser) {
    // DESACTIVAR seguimiento
    isFollowingUser = false;
    btn.style.transition = 'none';
    btn.style.color = '';
    btn.style.background = '';
    btn.style.borderColor = '';
    btn.style.boxShadow = '';
    // Forzar reflow y restaurar transición después de un instante
    void btn.offsetWidth; // trigger reflow para aplicar style.transition = 'none' instantáneamente
    btn.style.transition = '';
    } else {
        // ACTIVAR seguimiento
        if (userCoordsActual) {
            map.flyTo(userCoordsActual, 18, { duration: 1.2 });
            isFollowingUser = true;
            btn.style.color = '#3b82f6';
            btn.style.background = 'rgba(59, 130, 246, 0.2)';
            btn.style.borderColor = 'rgba(59, 130, 246, 0.5)';
            btn.style.boxShadow = '0 0 15px rgba(59, 130, 246, 0.4)';
        } else {
            alert(t('locationWait'));
        }
    }
}


// Indicador de dirección cuando el usuario está fuera del mapa
function updateDirectionIndicator(userCoords) {
    const indicator = document.getElementById('userDirectionIndicator');
    const arrow = document.getElementById('directionArrow');
    if (!indicator || !arrow || !map) return;
    // Guardar el ángulo anterior para evitar giros de 360°
if (!arrow.dataset.lastAngle) arrow.dataset.lastAngle = 0;
let lastAngle = parseFloat(arrow.dataset.lastAngle);
    
    const mapBounds = map.getBounds();
    const userLatLng = L.latLng(userCoords[0], userCoords[1]);
    
    // Si el usuario está dentro de los límites del mapa, ocultar indicador
    if (mapBounds.contains(userLatLng)) {
        indicator.style.display = 'none';
        return;
    }
    
    // Calcular el punto más cercano en el borde del mapa
    const bounds = mapBounds;
    const lat = userCoords[0];
    const lng = userCoords[1];
    
    // Acotar coordenadas al borde del mapa
    const clampedLat = Math.max(bounds.getSouth(), Math.min(bounds.getNorth(), lat));
    const clampedLng = Math.max(bounds.getWest(), Math.min(bounds.getEast(), lng));
    
    // Convertir a punto en el contenedor del mapa
    const point = map.latLngToContainerPoint(L.latLng(clampedLat, clampedLng));
    const mapContainer = map.getContainer();
    
    // Posicionar el indicador
    indicator.style.display = 'flex';
    indicator.style.position = 'absolute';
    indicator.style.left = Math.max(16, Math.min(mapContainer.clientWidth - 48, point.x - 16)) + 'px';
    indicator.style.top = Math.max(16, Math.min(mapContainer.clientHeight - 48, point.y - 16)) + 'px';
    
    // Calcular ángulo hacia la ubicación real
    const angle = Math.atan2(
    userCoords[1] - clampedLng,
    userCoords[0] - clampedLat
) * (180 / Math.PI);
    
    // Corregir el ángulo para evitar giros de más de 180°
let delta = angle - lastAngle;
if (delta > 180) delta -= 360;
if (delta < -180) delta += 360;
const smoothAngle = lastAngle + delta;

arrow.style.transform = `rotate(${smoothAngle}deg)`;
arrow.dataset.lastAngle = smoothAngle;

    // Evitar giro brusco: forzar transición corta solo para este cambio
arrow.style.transition = 'transform 0.2s ease';
arrow.style.display = 'block';
}

// Hacer clic/tocar en la flecha azul centra el mapa en tu ubicación (sin seguimiento)
function setupDirectionClick() {
    const indicator = document.getElementById('userDirectionIndicator');
    if (!indicator) return;
    
    indicator.style.cursor = 'pointer';
    indicator.style.pointerEvents = 'auto';
    
    const centerToUser = function(e) {
        if (e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        if (userCoordsActual) {
            map.setView(userCoordsActual, 18);
        } else {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const coords = [pos.coords.latitude, pos.coords.longitude];
                        userCoordsActual = coords;

        function actualizarListaCercanos() {
            const poiItems = document.querySelectorAll('.poi-item');

        function calcularDistancia(coords1, coords2) {
            const R = 6371e3;
            const φ1 = coords1[0] * Math.PI/180;
            const φ2 = coords2[0] * Math.PI/180;
            const Δφ = (coords2[0] - coords1[0]) * Math.PI/180;
            const Δλ = (coords2[1] - coords1[1]) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }

let startY = 0;

let isDragging = false;

alertBox.ontouchstart = function(e) {
    if (e.target.closest('.alert-close') || e.target.closest('.alert-btn')) return;
    startY = e.touches[0].clientY;
    const rect = alertBox.getBoundingClientRect();
    startTop = rect.top;
    isDragging = true;
    e.preventDefault();
    alertBox.style.transition = 'none';
    alertBox.style.bottom = 'auto';
    alertBox.style.top = startTop + 'px';

alertBox.ontouchmove = function(e) {
    if (!isDragging) return;
    if (e.target.closest('.alert-close') || e.target.closest('.alert-btn')) return;
    e.preventDefault();
    
    const deltaY = e.touches[0].clientY - startY;
    let newTop = startTop + deltaY;
    
    const maxTop = window.innerHeight - alertBox.offsetHeight - 16;
    if (newTop < 16) newTop = 16;
    if (newTop > maxTop) newTop = maxTop;
    
    alertBox.style.top = newTop + 'px';
    alertBox.style.bottom = 'auto';
};

alertBox.ontouchend = function(e) {
    if (!isDragging) return;
    isDragging = false;
    if (e.target.closest('.alert-close') || e.target.closest('.alert-btn')) return;
    e.preventDefault();
    
    const rect = alertBox.getBoundingClientRect();
    const midScreen = window.innerHeight / 2;
    const alertMiddle = rect.top + rect.height / 2;
    
    alertBox.style.transition = 'top 0.5s cubic-bezier(0.22, 0.61, 0.36, 1)';
    
    if (alertMiddle < midScreen) {

        const maxTop = window.innerHeight - alertBox.offsetHeight - 24;
        alertBox.style.top = maxTop + 'px';
        alertBox.dataset.position = 'bottom';
    }
    alertBox.style.bottom = 'auto';
};

// Función para crear el efecto de "rotura" al desbloquear una leyenda
function crearEfectoDesbloqueo(elemento, puntoId) {
    if (!elemento) return;
    
    // Añadir clase de animación al elemento
    elemento.classList.add('unlocking');
    
    // Obtener la posición del elemento en la pantalla
    const rect = elemento.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    // Crear 30 partículas que salen volando
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'shatter-particle';
        
        // Ángulo aleatorio (0 a 360 grados)
        const angle = Math.random() * Math.PI * 2;
        // Distancia aleatoria (40 a 150 píxeles)
        const distance = 40 + Math.random() * 110;
        
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance - 30; // hacia arriba preferentemente
        
        particle.style.setProperty('--dx', dx + 'px');
        particle.style.setProperty('--dy', dy + 'px');
        particle.style.left = (centerX + (Math.random() - 0.5) * 30) + 'px';
        particle.style.top = (centerY + (Math.random() - 0.5) * 30) + 'px';
        
        // Colores de partículas según el tipo de punto
        const punto = puntos.find(p => p.id === puntoId);
        if (punto) {
            particle.style.background = `radial-gradient(circle, ${punto.cor}, #ffffff)`;
        }
        
        document.body.appendChild(particle);
        
        // Eliminar la partícula después de la animación
        setTimeout(() => particle.remove(), 600);
    }
    
    // Crear 5 líneas de grieta
    for (let i = 0; i < 5; i++) {
        const crack = document.createElement('div');
        crack.className = 'crack-line';
        crack.style.left = (centerX + (Math.random() - 0.5) * 40) + 'px';
        crack.style.top = (centerY + (Math.random() - 0.5) * 40) + 'px';
        crack.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(crack);
        setTimeout(() => crack.remove(), 400);
    }
    
    // Quitar la clase de animación después de que termine
    setTimeout(() => {
        elemento.classList.remove('unlocking');
    }, 600);
    
    // Vibración personalizada para el desbloqueo
    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
    }
}

            const savedMode = localStorage.getItem('darkMode');
            if (savedMode === 'light') {
                body.classList.add('light-mode');
                if (darkModeToggle) darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                if (darkModeToggleDetail) darkModeToggleDetail.innerHTML = '<i class="fas fa-sun"></i>';
            }
           
            function toggleDarkMode() {
    body.classList.toggle('light-mode');
   
    if (body.classList.contains('light-mode')) {
        localStorage.setItem('darkMode', 'light');
        if (darkModeToggle) darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        if (darkModeToggleDetail) darkModeToggleDetail.innerHTML = '<i class="fas fa-sun"></i>';
    } else {
        localStorage.setItem('darkMode', 'dark');
        if (darkModeToggle) darkModeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        if (darkModeToggleDetail) darkModeToggleDetail.innerHTML = '<i class="fas fa-moon"></i>';
    }
    
    // Forzar actualización de la lista de puntos cercanos
    setTimeout(() => {
        actualizarListaCercanos();
    }, 100);
}
           
            if (darkModeToggle) darkModeToggle.addEventListener('click', toggleDarkMode);
            if (darkModeToggleDetail) darkModeToggleDetail.addEventListener('click', toggleDarkMode);
            document.getElementById('copyStoryHeaderBtn').addEventListener('click', copyStoryToClipboard);
           
           function copyStoryToClipboard() {
    const storyElement = document.getElementById('storyTextContent');
    if (!storyElement) return;
    
    const text = storyElement.innerText || storyElement.textContent;
    const btn = document.getElementById('copyStoryHeaderBtn'); // ← ahora usamos el botón del header
    if (!btn) return;

    const originalHtml = btn.innerHTML; // guardamos el icono original

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i>';
            setTimeout(() => { btn.innerHTML = originalHtml; }, 2000);
        }).catch(() => {
            fallbackCopy(text, btn, originalHtml);
        });
    } else {
        fallbackCopy(text, btn, originalHtml);
    }
}

function fallbackCopy(text, btn, originalHtml) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        btn.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i>';
        setTimeout(() => { btn.innerHTML = originalHtml; }, 2000);
    } catch (e) {
        console.error('Error al copiar:', e);
    }
    document.body.removeChild(textarea);
}
           
            document.getElementById('alertClose').addEventListener('click', () => {
                document.getElementById('proximityAlert').classList.remove('show');
            });
        });
        // Control del botón de atrás de Android (WebView)
document.addEventListener('DOMContentLoaded', function() {
    // Añadir estados al historial para que el botón atrás funcione correctamente
    // Esto crea una entrada en el historial al cargar la página
    history.pushState({ page: 'map' }, 'Mapa', window.location.href);
    
    window.addEventListener('popstate', function(event) {
        // Obtener la pantalla activa actual
        const screens = document.querySelectorAll('.screen');
        let activeScreen = null;
        screens.forEach(screen => {
            if (screen.classList.contains('active')) {
                activeScreen = screen.id;
            }
        });
        
        // Comportamiento según la pantalla activa
        if (activeScreen === 'screenPoiDetail') {
            // Si estamos en detalle, volver al mapa
            event.preventDefault();
            showMapScreen();
            // Añadir nuevo estado al historial para mantener el control
            history.pushState({ page: 'map' }, 'Mapa', window.location.href);
        } else if (activeScreen === 'screenMap') {
            // Si estamos en el mapa, salimos de la app (comportamiento normal)
            // No hacemos nada, el sistema maneja la salida
            return;
        } else if (activeScreen === 'screenLanguage') {
            // Si estamos en la pantalla de idiomas, salimos
            return;
        } else {
            // Por defecto, prevenir y volver al mapa
            event.preventDefault();
            showMapScreen();
            history.pushState({ page: 'map' }, 'Mapa', window.location.href);
        }
    });
});
