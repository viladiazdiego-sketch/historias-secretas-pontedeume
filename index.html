        /* Eliminar resaltes en móviles y focus */
/* Solo para ordenador (con teclado) mostramos el borde de enfoque */
@media (hover: hover) and (pointer: fine) {
    *:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
        border-radius: 4px;
    }
}

/* En móvil, solo ocultamos el outline para interacción táctil, no para teclado */
@media (max-width: 768px) {
    *:focus:not(:focus-visible) {
        outline: none;
    }
    *:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
        border-radius: 4px;
    }
}

        /* Fondo con textura y degradado dinámico */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15), transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15), transparent 60%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 10px);
    background-color: #030614;
}

.gradient-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, rgba(15, 20, 30, 0.5), rgba(5, 10, 20, 0.7));
    z-index: 1;
    pointer-events: none;
    animation: subtleShift 15s ease-in-out infinite alternate;
}

@keyframes subtleShift {
    0% {
        opacity: 0.7;
        background: linear-gradient(145deg, rgba(15, 20, 30, 0.5), rgba(5, 10, 20, 0.7));
    }
    100% {
        opacity: 0.9;
        background: linear-gradient(235deg, rgba(30, 20, 40, 0.5), rgba(10, 15, 25, 0.8));
    }
}

.particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

        .lang-btn {
    padding: 18px;
    border: none;
    border-radius: 100px;
    font-size: 1.1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border: 1.5px solid rgba(255, 255, 255, 0.15);
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 20px rgba(59, 130, 246, 0);
    letter-spacing: 0.3px;
    animation: borderGlow 3s ease-in-out infinite;
}

@keyframes borderGlow {
    0%, 100% { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 20px rgba(59, 130, 246, 0); }
    50% { border-color: rgba(99, 102, 241, 0.5); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 30px rgba(99, 102, 241, 0.3); }
}

.lang-btn:hover {
    border-radius: 30px;
    transform: scale(1.02) translateY(-3px);
    border-color: rgba(255, 255, 255, 0.4);
}

.lang-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transition: left 0.6s ease;
}

.lang-btn:hover::before {
    left: 100%;
}

.lang-btn::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}
       
        @media (hover: hover) {
    .lang-btn:hover::after {
        width: 300px;
        height: 300px;
    }

    .lang-btn:hover {
        transform: scale(1.02);
        border-color: rgba(255, 255, 255, 0.3);
    }
}

        .poi-item {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    background: rgba(15, 20, 30, 0.6);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    position: relative;
    overflow: hidden;
    isolation: isolate;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

.poi-item::after {
    content: '';
    position: absolute;
    top: var(--y, 50%);
    left: var(--x, 50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 70%);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: -1;
}

.poi-item:hover::after {
    opacity: 1;
}

.poi-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.02), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
}

.poi-item:hover::before {
    opacity: 1;
}

    0%, 100% {

    }

        box-shadow: 0 0 0 8px rgba(59, 130, 246, 0), 0 0 0 15px rgba(59, 130, 246, 0);
    }
}

.user-location::before,
.user-location::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 2px solid rgba(59, 130, 246, 0.6);
    transform: translate(-50%, -50%);
    animation: radarRing 3s ease-out infinite;
    pointer-events: none;

    height: 20px;

        // Cursor personalizado (solo en dispositivos con hover/ratón)
const isHoverDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

if (isHoverDevice) {
    const cursor = document.createElement('div');
    cursor.className = 'custom-cursor';
    const cursorDot = document.createElement('div');
    cursorDot.className = 'custom-cursor-dot';
    document.body.appendChild(cursor);
    document.body.appendChild(cursorDot);

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
    });

    document.addEventListener('mousedown', () => {
        cursor.classList.add('expanded');
        cursorDot.style.transform = 'translate(-50%, -50%) scale(1.5)';
    });

    document.addEventListener('mouseup', () => {
        cursor.classList.remove('expanded');
        cursorDot.style.transform = 'translate(-50%, -50%) scale(1)';
    });

    // Efecto hover en elementos interactivos
    const interactiveElements = 'button, .poi-item, .icon-btn, .tab-btn, .distance-badge';
    document.addEventListener('mouseover', (e) => {
        if (e.target.closest(interactiveElements)) {
            cursor.classList.add('expanded');
        }
    });

    document.addEventListener('mouseout', (e) => {
        if (e.target.closest(interactiveElements)) {
            cursor.classList.remove('expanded');
        }
    });
}

// Canvas de partículas interactivo
const particleCanvas = document.getElementById('particleCanvas');
const ctx = particleCanvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 40;

function resizeCanvas() {
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Crear partículas
for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
        x: Math.random() * particleCanvas.width,
        y: Math.random() * particleCanvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 1.5 + 0.5,
        baseX: 0,
        baseY: 0
    });
}

let pmouseX = 0, pmouseY = 0;
document.addEventListener('mousemove', (e) => {
    pmouseX = e.clientX;
    pmouseY = e.clientY;
});

function getParticleColor() {
    return document.body.classList.contains('light-mode') 
        ? 'rgba(0, 0, 0, 0.12)' 
        : 'rgba(255, 255, 255, 0.3)';
}

function animateParticles() {
    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    
    const color = getParticleColor();
    
    particles.forEach(p => {
        // Movimiento suave de fondo
        p.x += p.vx;
        p.y += p.vy;
        
        // Rebotar en bordes
        if (p.x < 0 || p.x > particleCanvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > particleCanvas.height) p.vy *= -1;
        
        // Interacción con ratón
        const dx = pmouseX - p.x;
        const dy = pmouseY - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 150) {
            const angle = Math.atan2(dy, dx);
            const force = (150 - dist) / 150 * 1.5;
            p.x -= Math.cos(angle) * force;
            p.y -= Math.sin(angle) * force;
        }
        
        // Dibujar
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        
        // Brillo sutil
        if (!document.body.classList.contains('light-mode')) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.fill();
        }
    });
    
    requestAnimationFrame(animateParticles);
}

p.id === 'p7' ? 'O castelo da fame' :

                              subtitle: p.id === 'p1' ? 'A carreira ao mar' : p.id === 'p2' ? 'O feitizo asolagante' : p.id === 'p3' ? 'Vixiados polo demo' : p.id === 'p4' ? 'A ponte do demo' : p.id === 'p5' ? 'Amor e sal na ría' : p.id === 'p6' ? 'O amor entre a serea e o fidalgo' : p.id === 'p9' ? 'O pendente perdido' : p.id === 'p7' ? 'Amor encadeado' : 'O pirata Roxín',
                    story: (() => {
                        if (p.id === 'p1') {
                            return `Conta a lenda que <strong>hai moitísimo tempo</strong> naceron tres fontes na Serra do Xistral e sentiron a chamada do mar. As tres querían chegar ao mar canto antes porque así recibirían un gran tesouro, así que decidiron partir xuntas para así compartilo. Así pois, as tres comezaron xuntas o seu camiño cara ao mar e convertéronse nos ríos Sor, Lando e Eume.

Cando xa levaban baixado un bo treito e comezaba a caer a noite os tres ríos sentiron que as forzas lles faltaban e pactaron que botarían unha pequena soneca antes de retomar a súa andaina e que o primeiro que espertase avisaría aos outros dous para seguir xuntos a viaxe cara ao mar.

Así e todo, Antubel, a deusa celta das augas durmidas, das sombras e da noite, apareceu e espertou ao Sor e tentouno para que marchara caladiñamente sen os seus compañeiros cara ao mar Cantábrico. E o Sor, cegado pola avaricia de chegar á meta o primeiro, partiu sen demora. Cando o Sor marchou, fixo o mesmo co Landro que tamén caeu na tentación da deusa celta e marchou silandeiro para abrazarse co mar Cantábrico.

Á mañá seguinte, cando o Eume espertou e viu que os outros ríos o enganaran e xa marcharan, pediulle axuda a Endovélico, o deus ancestral do lume e da luz, e este axudouno para que chegara canto antes. O Eume, enfurecido, seguiu decontado o luceiro de Endovélico cara ao golfo Ártabro, por non coincidir no Cantábrico cos seus traizoeiros rivais, veloz e sen descanso, durante 80 kms, saltando por riba de todo o que se lle puxo diante.

O Eume foi o primeiro dos tres en chegar ao mar, a Pontedeume deixando atrás fermosas paisaxes como son as Fragas do Eume e recibindo así unha morea de peixes e <strong>criaturas extraordinarias como tesouro, entre elas as sereas</strong> que tamén serán protagonistas deste roteiro.`;
                        } else if (p.id === 'p2') {
                            return `Moi antigamente, na desembocadura do Eume, na aba do monte de Breamo, os nosos devanceiros construíran un poboado que medraba en riqueza cada día, grazas á súa vizosa agricultura e gandaría e a abondosa pesca das rías veciñas.

Un día chegaron á antiga e próspera vila, tres fermosas donas transparentes de cabelos louros que peiteaban con tres valiosos e máxicos peites de ouro e que enfeitizaron a moitos homes do lugar. Eran seres sobrenaturais, que lles facían as beiras cos seus encantamentos aos mozos máis garridos da vila.

As tres donas transparentes só mostraban a súa fermosura despois do solpor e os homes acudían ao seu palacio, noite tras noite onde se celebraban verdadeiras orxías e bacanais. As liortas eran constantes entre eles e a prosperidade da vila estaba xa en perigo porque a festa permanente é inimiga do traballo e da defensa da cidade.

Os membros do Consello de Anciáns estaban seriamente preocupados, polo que falaron co druída, que lles dixo que eran fadas encantadas que só traerían destrución. Este mandou que xuntasen a xente ao abeiro dos castros e que permanecesen alí durante tres días. Logo subiu ao cumio do monte Breamo e botou un esconxuro. Pouco despois refuxiouse tamén nun castro e decontado comezou a chover a Deus dar auga e non parou ata que pasaron tres días.

A cidade quedou asolagada e os mozos que non fixeron caso da advertencia do Consello de Anciáns morreron afogados. Só salvaron a vida os que se goreceron no castro coas súas familias.

Contan as lendas que, mesmo no medievo, estas poboacións sepultadas baixo as augas seguían vivas e que, en días sinalados, tocaban as campás e se oían os galos; os seus habitantes convertéranse en peixes moi grandes e negros. As cidades asolagadas pertencían ao mundo dos mortos.

Das tres donas transparentes nunca máis se soubo de certo, aínda que hai quen di que se converteron en sereas e non abandonaron a nosa ría; unha vive nas profundidades do mar preto da Macuca; outra, no Mourón, <strong>e a terceira nas Mirandas (desta última falaremos despois)</strong>.`;
                        } else if (p.id === 'p3') {
                            return `Os achados romanos encontrados en Zopazos e outros lugares próximos parecen indicar que xa en tempos castrexos existía algún tipo de pasadoiro para comunicar, con marea baixa, os numerosos castros dunha a outra banda da ría.

Conta unha lenda que os nosos devanceiros, antigamente, chantaran uns pasais de pedra, cubertos de madeira, para poder atravesar a pé, coa baixada da marea, dunha beira á outra da desembocadura do Eume. O paso con marea alta non se podía realizar se non era nunha pequena embarcación.

Mais xa fose polo deterioro das pedras e da madeira, polas frecuentes riadas ou porque con frecuencia atravesaban con pesadas cargas, os antigos poboadores das ribeiras do Eume, ás veces esvaraban e, despois dunha peripatética danza intentando non perder a verticalidade, caían ao mar.

Como moitos non sabían nadar e eran arrastrados pola corrente, o Demo estaba ao axexo para lles ofrecer a súa sempre interesada axuda. Algúns perderon a vida por rexeitar o satánico ofrecemento, pero non foron poucos os que lle entregaron a súa alma para saír do apuro <strong>(como tamén lle sucedeu a Minla tempo máis tarde)</strong>.`;
                        } else if (p.id === 'p4') {
                            return `<strong>No último cuarto do século XIV</strong>, a fermosa Minla, filla do primeiro señor de Pontedeume, Fernán Pérez de Andrade, vivía no palacio que os seus pais tiñan na vila e todos os días, co solpor, para non ser vista, acudía á ribeira a agardar por Ledán, un forte e garrido labrego de Cabanas ao que un mariñeiro amigo atravesaba no seu barco ata o outro lado do Eume para que puidese estar coa súa amada.

Unha tarde levantouse, de súpeto, un gran temporal e as augas do río baixaban moi embravecidas. O mariñeiro non o quixo levar porque consideraba que era perigoso e Ledán, experto nadador, como sabía que na outra beira do río o agardaba Minla decidiu cruzar a nado a Pontedeume.

Así e todo, e a pesar da súa destreza, afogou xa en Cabanas. Minla desde Pontedeume viu como o seu amado morría diante dos seus ollos sen poder socorrelo. Foi nese momento cando o demo, atento ás desgrazas alleas, se achegou á dama e ofreceulle axuda:

- Se me das a túa alma, ao amencer heiche ter feita unha ponte!

A moza, desesperada por darlle o derradeiro bico de amor a Ledán, aceptou coa condición de que a ponte estivese rematada antes de que cantase o galo negro do curral dos Andrade. O demo traballou toda a noite e foi quen de facer case setenta e un arcos de cantería. Ao alborexar cantou o galo dos Andrade e aínda quedaba un arco por rematar. Pero como a ponte xa case estaba rematada Minla puido cruzar e despedirse de Ledán dando un pequeno salto sobre o arco inacabado e así salvou a súa alma e o demo quedou retorto.

O señor de Pontedeume, cando a súa filla lle contou o acontecido, decidiu terminar o último arco da ponte que uniu por terra a vila cos outros pobos situados na outra beira do río.

Hai quen afirma, con retranca, que o nome de Pontedeume non significa "ponte do Eume", senón "ponte do demo".`;
                        } else if (p.id === 'p5') {
                            return `O rei Afonso X o Sabio concedeu a Pontedeume <strong>en 1270</strong> un privilexio: permitíalles aos seus habitantes pescar libremente polo mar e eximíaos de pagar impostos de ningún tipo por todo canto pescasen. Ademais da súa protección, concedeulles tamén un día de mercado cada mes e garantíalles seguridade ao que alí fosen.

Isto supuxo un impulso moi grande para a pesca e o comercio en Pontedeume, aínda que tamén trouxo perigos de fóra, como ataques de embarcacións invasoras ou mesmo <strong>piratas (como Roxín Roxal</strong>, do que logo falaremos) que entraban na ría polo golfo Ártabro.

Un dos homes máis aventureiros da vila mercou un barco e decidiu probar fortuna fóra de Pontedeume e prometeulle á súa noiva (a rapaza máis fermosa da vila) que pronto volvería con cartos e que casarían, como sempre quixeran.

Na súa viaxe chegou un día á illa do Sal e cando bicou o seu branco xabre (area grosa), comprobou que era moi saboroso. Entón encheu o seu barco desa area salgada e foina vender polo mundo, facéndose así rico co seu comercio.

Cando volveu a Pontedeume, mandou construír alí unha luxosa vivenda e casou coa súa noiva. Mais pouco despois do casamento, o home volveu marchar no seu barco para continuar a súa actividade comercial, e a súa muller quedou na fermosa casa que construíran.

Naquela altura o responsable do coidado da vila era un tirano que vivía na fortaleza defensiva situada no lugar onde hoxe se atopa o torreón dos Andrade. Tiña unha grande envexa da persoa que se convertera no home máis rico da vila e no esposo da moza máis belida.

Por esta razón, unha noite aproveitando a ausencia do marido, decidiu secuestrar a rapaza na súa torre, onde a encarcerou para aldraxala e violala. Pero esa noite a lúa deu paso a unha forte tempestade que provocou unhas insólitas e feras ondas que derrubaron o cuarto da fortaleza onde se atopaba o fidalgo e que lle causaron a morte.

Cando regresou o home un mes despois e lle contaron como fora liberada a súa querida muller, decidiu como recompensa verter todo o sal que quedaba na súa illa naquelas augas do esteiro e do porto eumés e mais na boca da ría de Ares, pois aínda eran doces, para que tivesen mellor sabor; por iso hoxe son salgadas.

Así mesmo, quixo quedar xa sempre na vila para coidar persoalmente da fermosa moza e gozar da súa compañía.`;
                        } else if (p.id === 'p7') {
                            return `Contan en Pontedeume que, <strong>sendo señor Fernán Pérez de Andrade -ou Nuno Freire de Andrade-</strong>, o alcaide do castelo, Pero Lopez, famoso pola súa crueldade, namorou dunha rapaza chamada Elvira, ama de compañía da señora de Andrade, á que servía no torreón de Pontedeume. Ela rexeitou os seus amores porque xa era noiva de Mauro, o paxe favorito de don Fernán -ou don Nuno-. Había mesmo rumores de que podía ser o seu fillo.

O alcaide non podía aturar que Elvira preferise a Mauro antes que a el e mandou ao único servente no que confiaba a que secuestrase os amantes e os encerrase nunha dependencia da torre do castelo de Andrade á que ninguén máis podía acceder.

Os señores de Pontedeume, alarmados pola súa desaparición andaron varios días na súa procura, pola vila, polas parroquias, nas Fragas do Eume, nos bosques de Breamo… pero todos os seus intentos acabaron en fracaso.

O alcaide convenceu a don Fernán -ou a don Nuno- de que tiña información que lle permitía asegurar que os dous namorados fuxiran xuntos ben lonxe. E aínda que de vez en cando subían á azotea do Torreón coa esperanza de que regresasen, confiados nas explicacións de Pero Lopez, aceptaron resignados que non os volverían ver.

Os dous rapaces permaneceron longos meses encadeados na escura e solitaria cela na que os encerraran e o servente do alcaide, que era mudo, leváballes comida a diario. O único consolo para os amantes era que estaban xuntos.

Un día, cando o fiel servo lles levou o xantar, o valente Mauro aproveitou que se inclinaba para deixar o prato no chan e golpeouno con tanta forza que o deixou ferido de morte. Conseguiu arrebatarlle as chaves e soltarse, pero mentres foi liberar a Elvira, o carcereiro fuxiu coas chaves da cela e quedaron encerrados.

O servo contoulle por acenos o que acontecera e cando rematou o relato morreu. O alcaide, en vinganza, decidiu deixar morrer de fame aos amantes. Pasados varios meses e xa no seu leito de morte o alcaide confesoulle ao señor de Pontedeume o que urdira contra Mauro e Elvira e cando chegaron á cela do castelo de Andrade, atoparon os seus cadáveres abrazados.`;
                        } else if (p.id === 'p9') {
                            return `Segundo antigas lendas, <strong>moitas cidades asolagadas</strong> quedaron sepultadas baixo as areas e que as persoas que se aventuran nas súas augas corren o risco de seren tragadas para pasar a aumentar o censo dos seus habitantes. Contan en Pontedeume que algo semellante foi o que aconteceu coa Francesiña.

Sobre a mítica e lendaria cidade asolagada (<strong>na que as tres donas</strong> causaban sensación entre os homes do lugar) construírase no comezo do <strong>século XX</strong> a ponte de ferro eumesa. Foi durante a súa construción cando aconteceu esta historia: unha francesiña que veraneaba todos os meses de agosto en Pontedeume adoitaba tirarse do murallón e nadar ata a pena do Soldado. Era unha magnífica nadadora e os mariñeiros que remendaban as redes no murallón ficaban abraiados, pois a súa forma de xogar coas ondas lembráballes á dunha serea.

Un día, cando cruzaba nadando por debaixo da ponte de ferro, perdeu o que ela xulgaba o seu máis prezado tesouro (un pendente de ouro que o seu mozo eumés lle regalara). Aínda non chegara a súa xoia ao fondo do mar e xa pensaba ela no xeito de recuperala. Subiu á primeira cepa da ponte, colleu folgos e mergullouse nas profundidades. Pero todo foi inútil.

A mítica cidade somerxida baixo as areas xa collera un novo tesouro e abofé que non o había soltar. A Francesiña loitou tamén por non ser atrapada, pero aínda que foi quen de escapar, cando aboiou, xa estaba morta. Un mariñeiro da ribeira saltou axiña a bordo dunha barca e foi onda ela pero só conseguiu recoller o seu corpo.

A Francesiña foi enterrada en Pontedeume e na súa sepultura esculpiron en mármore o seu rosto, no que faltaba o pendente.`;
                        } else if (p.id === 'p8') {
                            return `Despois de que en 1270 Afonso X o Sabio outorgase o privilexio que impulsou o poboamento e a fundación de Pontedeume, a vila fortificouse para facer fronte aos ataques de <strong>embarcacións invasoras ou mesmo piratas</strong> que chegaban á ría polo golfo Ártabro. Esta foi tamén a razón da construción en Nogueirosa da fortaleza do castelo de Andrade.

Nos tempos de Fernán Pérez de Andrade, chegaron a Pontedeume uns piratas que pretendían saquear a vila. Un deles de pelo roxo e pel branca coma a neve, rouboulle ademais o corazón a unha das doncelas que servían no palacio dos Andrade e mantivo con ela unha apaixonada relación amorosa.

Así e todo, pouco lles durou a felicidade, pois algúns días máis tarde o pirata marchou na súa embarcación cos seus compañeiros pola ría de Ares e a antes doncela pariu nove meses despois un fermoso fillo co pelo roxo e a pel branca coma o pai, do que nunca máis se volveu saber nada.

A rapaza, pola súa bondade e lealdade aos señores de Andrade, seguiu servindo no palacio e o fillo, ao que lle puxo por nome Roxín Roxal e que herdara a forza e valentía do seu pai e a lealdade da súa nai, cando cumpriu os quince anos, foi chamado como paxe para servir no castelo erguido sobre a pena Leboreiro, onde fixou a súa residencia.

Nese momento, <strong>primeiro cuarto do século XV</strong>, era xa señor de Pontedeume don Nuno Freire de Andrade, alcumado "O malo" polos seus vasalos que debido aos seus abusos organizaron a primeira revolta irmandiña. Don Nuno tiña dous descendentes varóns e vivía coa súa única filla, Tareixa, no seu palacio de Pontedeume.

Tareixa era unha rapaza moi alegre e fermosa e gozaba paseando a pé, dacabalo ou en barco, polo río Eume e a súa fraga, o monte Breamo ou polas praias da bisbarra. Pero como tamén era algo inconsciente e díscola, o seu pai decidiu encomendarlle o seu coidado e protección a Roxín Roxal, a quen tiñan por un rapaz intelixente e valente, merecedor da súa confianza e simpatía.

O doncel acompañaba a Tareixa onde queira que fose e, pouco a pouco, foi nacendo entre eles, primeiro, a amizade e, máis tarde, o amor. Roxín Roxal, que sempre andaba contento e feliz empezou a sentirse tristeiro e morriñento o tempo que non estaba con Tareixa, mais pola consideración que lle tiña a don Nuno non se atrevía a declararlle o seu amor a Tareixa.

Con todo, a moza cando viu a melancolía con que a miraba decatouse de que devecía por ela e confesoulle que o seu sentimento era recíproco. Pero o seu noivado durou ben pouco xa que cando o señor de Pontedeume soubo o que acontecía prohibiulle ao rapaz que volverse ver á súa filla e recluíuno ás inmediacións do castelo de Andrade.

Don Nuno, a pesar da grande estima que lle tiña, non podía tolerar que Roxín Roxal casase coa súa filla, pois era de moi humilde condición e, por iso, xa arranxara o matrimonio da súa filla con Henrique de Osorio, un home coa posición social que merecían os Andrade.

Roxín Roxal cumpriu escrupulosamente as ordes do seu señor e este decidiu agasallalo, como recompensa pola súa fidelidade, cunha valiosa daga de ouro na que aparecían gravadas as iniciais R.R. O tempo pasou, Henrique e Tareixa casaron, Nuno seguía gobernando o seu feudo e Tareixa non soubo máis nada de Roxín Roxal.

Nese tempo, un terrible xabaril, o máis grande dos que xamais se viu, comezou a atacar as terras dos Andrade. Canso das queixas dos seus campesiños, Nuno organizou unha batida, a cuxo fronte ían o seu xenro Henrique e a súa filla Tareixa. Foron acurralando ao xabaril, que xa ferido e ameazante baixou polo monte ata chegar á ponte onde o estaban esperando. Henrique de Osorio cando viu que o tiña a tiro lanzoulle unha frecha e o animal, enfurecido, atacou con saña a Tareixa, a quen feriu de morte. E o covarde do seu esposo, en lugar de defendela, tirouse ao río para salvar a súa propia vida.

Poucos días despois, na mesma ponte, apareceu morto o xabaril, que tiña cravada na súa gorxa a daga que don Nuno lle regalara a Roxín Roxal. Só o de Andrade sabía que non podía ser doutro cabaleiro. Foi entón cando entendeu que impedir o matrimonio entre a súa filla e o vasalo fora un gran desatino, xa que este, aínda sendo plebeo, abofé que a tería defendido mellor que o nobre don Henrique.`;
                                                } else if (p.id === 'p6') {
                            return `Contan en Pontedeume que, nas profundidades mariñas da ría de Ares, vive desde hai moitos séculos a serea das Mirandas, chamada así porque preto daquelas penas ten o seu fogar, aínda que se move por todo o golfo Ártabro. <strong>Seica nalgunha noite de lúa chea se achega ata a ponte de pedra</strong> para gozar da fermosura da vila, con moito coidado de que non a vexa ninguén.

As sereas son seres mitolóxicos que teñen o corpo, sempre espido, dunha muller fermosa, con longos cabelos e a cola dun peixe no canto das pernas. Levan un espello e un peite e viven en palacios de cristal cheos de riquezas debaixo do mar. Ademais, atraen os mariñeiros coa súa voz, sedúcenos e fanos afogar.

A serea das Mirandas adoita xogar cos golfiños e achegarse aos polbos, chocos e robalizas que se moven polo golfo Ártabro, pero ben sabe que o que nunca pode facer é achegarse aos homes porque, se desen con ela, xa non a deixarían en paz.

Algunhas noites de ardentía en agosto, moitos rapaces acoden ás praias para se bañaren á luz das estrelas. Unha desas noites de verán, <strong>nos últimos anos do século XIII</strong>, un fidalgo sorprendeu á serea sentada nunha rocha mentres se bañaba en Centroña. Quedou tan impresionado pola súa beleza que lle pediu que volvese ao día seguinte.

O fidalgo non tiña acougo sen ela e rogoulle que fose vivir onda el. Así o fixo a serea das Mirandas e este, con mimo, delicadez e moita paciencia, foille quitando unha a unha as escamas da súa cola ata que quedaron ao descuberto dúas fermosas e longas pernas de muller. Os dous namorados casaron, tiveron fillos e foron moi felices xuntos.

Mais cando o seu home morreu, a serea deixou os seus fillos xa maiores e <strong>volveu a vivir nas augas salgadas</strong> da ría de Ares, no fermoso palacio que tiña debaixo do mar, preto das illas Mirandas. Non se deixou ver máis por ser humano ningún, aínda que, certas noites de ardentía, algún vello mariñeiro conta que escoitou arrepiado a máis fermosa e doce canción de amor que viña do fondo do mar entoada pola voz da malpocada serea.`;
                        } else {
                            return 'Historia en galego pendente de redactar polo alumnado de 3º ESO.';
                        }
                    })(),

                    story: (() => {
                        if (p.id === 'p1') {
                            return `Cuenta la leyenda que hace muchísimo tiempo nacieron tres fuentes en la Sierra del Xistral y sintieron la llamada del mar. Las tres querían llegar al mar cuanto antes porque así recibirían un gran tesoro, así que decidieron partir juntas para compartirlo.
Así pues, las tres comenzaron juntas su camino hacia el mar y se convirtieron en los ríos Sor, Landro y Eume.

Cuando ya habían descendido un buen trecho y comenzaba a caer la noche, los tres ríos sintieron que las fuerzas les faltaban y acordaron echar una pequeña siesta antes de retomar su andanza, prometiendo que el primero que despertara avisaría a los otros dos para seguir juntos el viaje hacia el mar.

Sin embargo, Antubel, la diosa celta de las aguas dormidas, de las sombras y de la noche, apareció y despertó al Sor, tentándolo para que marchara silenciosamente hacia el mar Cantábrico sin esperar a sus compañeros. Y el Sor, cegado por la avaricia de llegar el primero a la meta, partió sin demora.
Cuando el Sor se fue, hizo lo mismo con el Landro, que también cayó en la tentación de la diosa celta y partió calladamente a abrazarse con el mar Cantábrico.

A la mañana siguiente, cuando el Eume despertó y vio que los otros ríos lo habían engañado y ya se habían marchado, pidió ayuda a Endovélico, el dios ancestral del fuego y de la luz, y este lo ayudó para que llegara cuanto antes. El Eume, enfurecido, siguió de inmediato el lucero de Endovélico hacia el golfo Ártabro, para no coincidir en el Cantábrico con sus traicioneros rivales, veloz y sin descanso durante 80 km, saltando por encima de todo lo que se le ponía delante.

El Eume fue el primero de los tres en llegar al mar, a Pontedeume, dejando atrás hermosos paisajes como las Fragas do Eume y recibiendo así una gran cantidad de peces y criaturas extraordinarias como tesoro, entre ellas las sirenas que también serán protagonistas de esta ruta.`;
                        } else if (p.id === 'p2') {
                            return `Hace muchísimo tiempo, en la desembocadura del Eume, a la falda del monte Breamo, nuestros antepasados construyeron un poblado que crecía en riqueza cada día, gracias a su abundante agricultura y ganadería, y a la pesca de las rías vecinas.

Un día llegaron a aquella antigua y próspera villa tres hermosas damas transparentes de cabellos rubios que se peinaban con tres valiosos y mágicos peines de oro, y que hechizaron a muchos hombres del lugar. Eran seres sobrenaturales que con sus encantamientos cortejaban a los mozos más apuestos de la villa.

Las tres damas transparentes solo mostraban su hermosura después del atardecer, y los hombres acudían a su palacio noche tras noche, donde se celebraban verdaderas orgías y bacanales. Las disputas eran constantes entre ellos y la prosperidad de la villa empezaba a peligrar, porque la fiesta permanente es enemiga del trabajo y de la defensa de la ciudad.

Los miembros del Consejo de Ancianos estaban seriamente preocupados, así que hablaron con el druida, quien les dijo que eran hadas encantadas que solo traerían destrucción. Les ordenó reunir a la gente bajo la protección de los castros y permanecer allí durante tres días. Luego subió a la cumbre del monte Breamo y lanzó un conjuro. Poco después también se refugió en un castro, y de inmediato comenzó a llover torrencialmente durante tres días.

La ciudad quedó anegada y los jóvenes que no hicieron caso de la advertencia del Consejo de Ancianos murieron ahogados. Solo salvaron la vida quienes se refugiaron en el castro con sus familias.

Cuentan las leyendas que incluso en la Edad Media esas poblaciones sepultadas bajo las aguas seguían vivas y que, en días señalados, sonaban sus campanas y se oían los gallos; sus habitantes se habían convertido en peces muy grandes y negros. Las ciudades anegadas pertenecían al mundo de los muertos.

De las tres damas transparentes nunca más se supo con certeza, aunque hay quien dice que se convirtieron en sirenas y no abandonaron nuestra ría: una vive en las profundidades del mar cerca de la Macuca; otra, en Mourón; y la tercera, en las Mirandas (de esta última hablaremos después).`;
                        } else if (p.id === 'p3') {
                            return `Los hallazgos romanos encontrados en Zopazos y otros lugares próximos parecen indicar que ya en tiempos castreños existía algún tipo de pasadero para comunicar, con marea baja, los numerosos castros de una a otra orilla de la ría.

Cuenta una leyenda que nuestros antepasados, antiguamente, habían clavado unos pasajes de piedra cubiertos de madera, para poder cruzar a pie, con la bajamar, de una orilla a otra de la desembocadura del Eume. El paso con marea alta solo podía hacerse en una pequeña embarcación.

Pero ya fuera por el deterioro de las piedras y de la madera, por las frecuentes crecidas o por el peso de las cargas que transportaban, los antiguos habitantes de las riberas del Eume a veces resbalaban y, tras una torpe danza intentando no perder el equilibrio, caían al mar.

Como muchos no sabían nadar y eran arrastrados por la corriente, el Diablo estaba al acecho para ofrecerles su siempre interesada ayuda. Algunos perdieron la vida por rechazar la oferta satánica, pero no fueron pocos los que le entregaron su alma para salir del apuro (como también le sucedió a Minla tiempo después).`;
                        } else if (p.id === 'p4') {
                            return `En el último cuarto del siglo XIV, la hermosa Minla, hija del primer señor de Pontedeume, <strong>Fernán Pérez de Andrade</strong>, vivía en el palacio que sus padres tenían en la villa. Todos los días, al atardecer, para no ser vista, acudía a la ribera a esperar a Ledán, un fuerte y apuesto labriego de Cabanas al que un marinero amigo cruzaba en su barco al otro lado del Eume para que pudiera estar con su amada.

Una tarde se levantó, de repente, una gran tempestad y las aguas del río bajaban muy embravecidas. El marinero no quiso llevarlo porque lo consideraba peligroso, y Ledán, experto nadador, sabiendo que en la otra orilla lo esperaba Minla, decidió cruzar a nado hacia Pontedeume.

Sin embargo, a pesar de su destreza, se ahogó ya en Cabanas. Minla, desde Pontedeume, vio cómo su amado moría delante de sus ojos sin poder socorrerlo. Fue entonces cuando el diablo, atento a las desgracias ajenas, se acercó a la dama y le ofreció ayuda:

—Si me das tu alma, al amanecer tendrás el puente terminado.

La joven, desesperada por darle el último beso de amor a Ledán, aceptó con la condición de que el puente estuviera terminado antes de que cantara el gallo negro del corral de los Andrade. El diablo trabajó toda la noche y logró hacer casi setenta y un arcos de piedra. Al amanecer cantó el gallo de los Andrade y aún quedaba un arco por terminar. Pero como el puente ya estaba casi completo, Minla pudo cruzar y despedirse de Ledán dando un pequeño salto sobre el arco inacabado; así salvó su alma y el diablo quedó burlado.

El señor de Pontedeume, cuando su hija le contó lo sucedido, decidió terminar el último arco del puente, que unió por tierra la villa con los pueblos situados en la otra orilla del río.

Hay quien afirma, con retranca, que el nombre de Pontedeume no significa "puente del Eume", sino "puente del diablo".`;
                        } else if (p.id === 'p5') {
                            return `El rey Alfonso X el Sabio concedió a Pontedeume en 1270 un privilegio: permitía a sus habitantes pescar libremente por el mar y los eximía de pagar impuestos de ningún tipo por todo lo que pescasen. Además de su protección, les concedió también un día de mercado cada mes y garantizó seguridad a todos los que acudieran.

Esto supuso un gran impulso para la pesca y el comercio en Pontedeume, aunque también trajo peligros externos, como ataques de embarcaciones invasoras o incluso piratas (como Roxín Roxal, del que hablaremos después) que entraban en la ría por el golfo Ártabro.

Uno de los hombres más aventureros de la villa compró un barco y decidió probar fortuna fuera de Pontedeume. Prometió a su novia —la joven más hermosa de la villa— que pronto volvería con dinero y se casarían, como siempre habían soñado.

En su viaje llegó un día a la isla del Sal y, al besar su blanca arena gruesa, comprobó que era muy sabrosa. Entonces llenó su barco con aquella arena salada y la vendió por el mundo, haciéndose rico con su comercio.

Cuando volvió a Pontedeume, mandó construir una lujosa casa y se casó con su novia. Pero poco después del matrimonio, el hombre volvió a marcharse en su barco para continuar su actividad comercial, y su esposa se quedó en la hermosa casa que habían construido.

Por aquel entonces, el responsable del cuidado de la villa era un tirano que vivía en la fortaleza defensiva situada donde hoy se alza el torreón de los Andrade. Sentía una gran envidia hacia aquel hombre, que se había convertido en el más rico de la villa y en esposo de la muchacha más bella.

Por esa razón, una noche, aprovechando la ausencia del marido, decidió secuestrar a la joven y encerrarla en su torre, donde intentó ultrajarla. Pero esa noche la luna dio paso a una fuerte tempestad que provocó unas olas tan feroces que derrumbaron la estancia de la fortaleza donde se encontraba el noble, causándole la muerte.

Cuando el hombre regresó un mes después y le contaron cómo había sido liberada su querida esposa, decidió, como recompensa, verter toda la sal que quedaba en su isla en aquellas aguas del estuario y del puerto eumés y en la boca de la ría de Ares —pues aún eran dulces— para que tuvieran mejor sabor; por eso hoy son saladas.

Asimismo, quiso quedarse para siempre en la villa, para cuidar personalmente de la hermosa joven y disfrutar de su compañía.`;
                        } else if (p.id === 'p9') {
                            return `Según antiguas leyendas, muchas ciudades anegadas quedaron sepultadas bajo las arenas, y las personas que se aventuran en sus aguas corren el riesgo de ser tragadas para aumentar el censo de sus habitantes. Cuentan en Pontedeume que algo semejante ocurrió con <strong>la Francesita</strong>.

Sobre la mítica y legendaria ciudad sumergida —aquella en la que las tres damas causaban sensación entre los hombres del lugar— se construyó, a comienzos del siglo XX, el <strong>puente de hierro</strong> de Pontedeume. Fue durante su construcción cuando ocurrió esta historia:

Una joven francesa que veraneaba todos los meses de agosto en Pontedeume solía lanzarse desde el malecón y nadar hasta la peña del Soldado. Era una magnífica nadadora, y los marineros que remendaban las redes en el muelle quedaban maravillados, pues su manera de jugar con las olas les recordaba a la de una sirena.

Un día, mientras nadaba bajo el puente de hierro, perdió lo que ella consideraba su más preciado tesoro: un pendiente de oro que su novio eumés le había regalado. Aún no había llegado su joya al fondo del mar y ya pensaba en cómo recuperarla. Subió al primer pilar del puente, tomó aire y se sumergió en las profundidades. Pero todo fue inútil.

La mítica ciudad sumergida bajo las arenas ya había atrapado un nuevo tesoro y no pensaba soltarlo. La Francesita luchó también por no ser arrastrada, pero aunque logró escapar, cuando emergió ya estaba muerta. Un marinero del puerto saltó enseguida a una barca y fue hacia ella, pero solo consiguió recoger su cuerpo.

La Francesita fue enterrada en Pontedeume, y en su sepultura esculpieron en mármol su rostro, en el que faltaba el pendiente.`;
                        } else if (p.id === 'p6') {
                            return `Cuentan en Pontedeume que, en las profundidades marinas de la ría de Ares, vive desde hace muchos siglos la <strong>sirena de las Mirandas</strong>, llamada así porque cerca de esas peñas tiene su hogar, aunque se mueve por todo el golfo Ártabro. Dicen que alguna noche de luna llena se acerca hasta el puente de piedra para disfrutar de la hermosura de la villa, con mucho cuidado de que nadie la vea.

Las sirenas son seres mitológicos que tienen el cuerpo —siempre desnudo— de una mujer hermosa, con largos cabellos y la cola de un pez en lugar de piernas. Llevan un espejo y un peine y viven en palacios de cristal llenos de riquezas bajo el mar. Además, atraen a los marineros con su voz, los seducen y los hacen ahogarse.

La sirena de las Mirandas suele jugar con los delfines y acercarse a los pulpos, sepias y lubinas que se mueven por el golfo Ártabro, pero bien sabe que lo que nunca debe hacer es acercarse a los hombres, porque, si la descubrieran, no la dejarían en paz.

Algunas noches de luminiscencia marina en agosto, muchos jóvenes acuden a las playas para bañarse a la luz de las estrellas. Una de esas noches de verano, a finales del siglo XIII, un hidalgo sorprendió a la sirena sentada en una roca mientras se bañaba en Centroña. Quedó tan impresionado por su belleza que le pidió que regresara al día siguiente.

El hidalgo no tenía sosiego sin ella y le rogó que fuese a vivir con él. Así lo hizo la sirena de las Mirandas, y este, con mimo, delicadeza y mucha paciencia, fue quitándole una a una las escamas de su cola hasta que quedaron al descubierto dos hermosas y largas piernas de mujer. Los dos enamorados se casaron, tuvieron hijos y fueron muy felices juntos.

Pero cuando su marido murió, la sirena dejó a sus hijos, ya mayores, y volvió a vivir en las aguas saladas de la ría de Ares, en el hermoso palacio que tenía bajo el mar, cerca de las islas Mirandas. No volvió a dejarse ver por ningún ser humano, aunque, ciertas noches de luminiscencia, algún viejo marinero cuenta haber escuchado, estremecido, la más hermosa y dulce canción de amor que venía del fondo del mar, entonada por la voz de la desdichada sirena.`;
                        } else if (p.id === 'p7') {
                            return `Cuentan en Pontedeume que, siendo señor <strong>Fernán Pérez de Andrade</strong> —o tal vez <strong>Nuño Freire de Andrade</strong>—, el alcaide del castillo, <strong>Pero López</strong>, famoso por su crueldad, se enamoró de una joven llamada <strong>Elvira</strong>, dama de compañía de la señora de Andrade, a la que servía en el torreón de Pontedeume. Ella rechazó su amor porque ya era novia de <strong>Mauro</strong>, el paje favorito de don Fernán —o don Nuño—. Incluso había rumores de que podía ser su hijo.

El alcaide no podía soportar que Elvira prefiriese a Mauro antes que a él y ordenó a su único sirviente de confianza que secuestrase a los amantes y los encerrase en una dependencia de la torre del castillo de Andrade a la que nadie más podía acceder.

Los señores de Pontedeume, alarmados por su desaparición, pasaron varios días buscándolos por la villa, las parroquias, las Fragas del Eume y los bosques de Breamo… pero todos sus intentos fracasaron.

El alcaide convenció a don Fernán —o a don Nuño— de que tenía información que le permitía asegurar que los dos enamorados habían huido juntos lejos. Y aunque de vez en cuando subían a la azotea del torreón con la esperanza de que regresasen, confiados en las explicaciones de Pero López, aceptaron resignados que no los volverían a ver.

Los dos jóvenes permanecieron largos meses encadenados en la oscura y solitaria celda donde los habían encerrado, y el sirviente del alcaide, que era mudo, les llevaba comida a diario. El único consuelo para los amantes era que estaban juntos.

Un día, cuando el fiel sirviente les llevó la comida, el valiente Mauro aprovechó que se inclinaba para dejar el plato en el suelo y lo golpeó con tal fuerza que lo dejó mortalmente herido. Logró arrebatarle las llaves y liberarse, pero mientras iba a soltar a Elvira, el carcelero huyó con las llaves de la celda, dejándolos encerrados.

El sirviente le contó por señas lo que había ocurrido y, cuando terminó su relato, murió. El alcaide, en venganza, decidió dejar morir de hambre a los amantes. Pasados varios meses y ya en su lecho de muerte, confesó al señor de Pontedeume lo que había urdido contra Mauro y Elvira, y cuando llegaron a la celda del castillo de Andrade, encontraron sus cadáveres abrazados.`;
                        } else if (p.id === 'p8') {
                            return `Después de que en 1270 Alfonso X el Sabio otorgara el privilegio que impulsó el poblamiento y la fundación de Pontedeume, la villa se fortificó para hacer frente a los ataques de embarcaciones invasoras o incluso de piratas que llegaban a la ría por el golfo Ártabro. Esta fue también la razón de la construcción, en Nogueirosa, de la fortaleza del castillo de Andrade.

En tiempos de <strong>Fernán Pérez de Andrade</strong>, llegaron a Pontedeume unos piratas que pretendían saquear la villa. Uno de ellos, de pelo rojo y piel blanca como la nieve, robó además el corazón de una doncella que servía en el palacio de los Andrade y mantuvo con ella una apasionada relación amorosa.

Sin embargo, la felicidad les duró poco, pues algunos días más tarde el pirata partió con sus compañeros por la ría de Ares, y la doncella dio a luz nueve meses después a un hermoso niño de pelo rojo y piel blanca como su padre, del que nunca más se volvió a saber nada.

La joven, por su bondad y lealtad hacia los señores de Andrade, siguió sirviendo en el palacio. Su hijo, al que puso por nombre <strong>Roxín Roxal</strong>, heredó la fuerza y valentía de su padre y la lealtad de su madre. Cuando cumplió quince años, fue llamado como paje para servir en el castillo erguido sobre la peña Leboreiro, donde estableció su residencia.

En aquel momento, en el primer cuarto del siglo XV, ya era señor de Pontedeume <strong>don Nuño Freire de Andrade</strong>, apodado "El Malo" por sus vasallos, quienes, debido a sus abusos, organizaron la primera revuelta irmandiña. Don Nuño tenía dos hijos varones y vivía con su única hija, <strong>Tareixa</strong>, en su palacio de Pontedeume.

Tareixa era una muchacha muy alegre y hermosa. Le encantaba pasear a pie, a caballo o en barco por el río Eume y su fraga, el monte Breamo o las playas de la comarca. Pero, como también era algo inconsciente y rebelde, su padre decidió encomendar su cuidado y protección a Roxín Roxal, a quien consideraban un joven inteligente y valiente, merecedor de su confianza y simpatía.

El paje acompañaba a Tareixa adondequiera que fuese y, poco a poco, entre ellos nació primero la amistad y luego el amor. Roxín Roxal, que siempre andaba alegre y feliz, comenzó a sentirse triste y melancólico cuando no estaba con Tareixa; pero, por el respeto que le tenía a don Nuño, no se atrevía a declararle su amor.

Sin embargo, la joven, al ver la melancolía con que la miraba, comprendió que moría de amor por ella y le confesó que su sentimiento era correspondido. Pero su noviazgo duró muy poco, porque cuando el señor de Pontedeume supo lo que ocurría, prohibió al muchacho volver a ver a su hija y lo confinó a los alrededores del castillo de Andrade.

Don Nuño, a pesar del gran afecto que le tenía, no podía tolerar que Roxín Roxal se casase con su hija, pues era de muy humilde condición. Ya había concertado el matrimonio de su hija con <strong>Enrique de Osorio</strong>, un hombre con la posición social que merecían los Andrade.

Roxín Roxal obedeció escrupulosamente las órdenes de su señor, y este decidió recompensarlo por su fidelidad con una valiosa daga de oro en la que estaban grabadas las iniciales <strong>R. R.</strong>.
El tiempo pasó: Enrique y Tareixa se casaron, Nuño siguió gobernando su feudo y Tareixa no volvió a saber nada de Roxín Roxal.

En ese tiempo, un terrible jabalí —el más grande que jamás se había visto— empezó a atacar las tierras de los Andrade. Cansado de las quejas de sus campesinos, Nuño organizó una batida, encabezada por su yerno Enrique y su hija Tareixa. Acorralaron al jabalí, que, ya herido y furioso, descendió por el monte hasta llegar al puente, donde lo esperaban. Enrique de Osorio, al verlo a tiro, le lanzó una flecha, y el animal, enfurecido, atacó con fiereza a Tareixa, hiriéndola de muerte. El cobarde de su esposo, en lugar de defenderla, se arrojó al río para salvar su propia vida.

Pocos días después, en el mismo puente, apareció muerto el jabalí, con la daga que Nuño había regalado a Roxín Roxal clavada en su garganta. Solo el señor de Andrade sabía que no podía pertenecer a otro caballero. Fue entonces cuando comprendió que impedir el matrimonio entre su hija y su vasallo había sido un gran error, pues este, aunque plebeyo, sin duda la habría defendido mejor que el noble don Enrique.`;
                        } else {
                            return 'Historia en español pendiente de redactar por el alumnado de 3º ESO.';
                        }
                    })(),

                en: {
    title: p.id === 'p1' ? "Eume's source" :
           p.id === 'p2' ? 'The three transparent maidens' :

    fullTitle: p.id === 'p1' ? "Eume's source" :
              p.id === 'p2' ? 'The three transparent maidens and the ancient Celtic flooded city' :

              p.id === 'p4' ? 'The bridge in Pontedeume' :

              subtitle: p.id === 'p1' ? 'Race to the sea' : p.id === 'p2' ? 'The flooding spell' : p.id === 'p3' ? 'Watched by the devil' : p.id === 'p4' ? "The devil's bridge" : p.id === 'p5' ? 'Love and salt in the estuary' : p.id === 'p6' ? 'The love between the mermaid and the nobleman' : p.id === 'p9' ? 'The lost earring' : p.id === 'p7' ? 'Love in chains' : 'The pirate Roxín',
                  story: (() => {
                                                if (p.id === 'p2') {
                            return `A really long time ago, in the mouth of the Eume, at the foot of Mount Breamo, our ancestors built a village that became richer and richer every day, thanks to its abundant agriculture and farming, and the fishing in the nearby area.

One day, three beautiful transparent maidens arrived at the ancient and prosperous village. They had blonde hair which they combed with three precious and magical golden combs, and they enchanted several local men. They were supernatural beings that seduced the most handsome men in the village with their spells.

The three transparent maidens only showed their beauty after sunset, and the men went to their palace every night and there, orgies and bacchanals took place. There were usually fights among them and the prosperity of the village started to be at risk because the permanent party is an enemy of the work and the defense of the town.

The members of the Assembly of the Elderly were really worried, so they spoke to the druid who told them that the women were enchanted fairies that would only bring destruction. He asked them to gather the people under the protection of the ringforts and stay there for three days. Then, he went up to the top of Mount Breamo and cast a spell. Soon after he also sought refuge in the ringfort and suddenly it started to rain heavily for three days.

The city was flooded and the young men did not pay attention to the warnings of the Assembly of the Elderly so they drowned. Only those who stayed in the ringfort were able to save their lives.

The legends say that even during the Middle Ages these people buried under water were still alive and that, on special days, the bells were tolled and the roosters could be heard; the inhabitants had turned into very large and black fish. The flooded cities belonged to the world of the dead.

Nothing more was heard about the three maidens although there are people who say that they turned into mermaids and abandoned our "ría": one lives in the depths of the sea near the Macuca; another one in Mourón; and the third in the Mirandas (we'll talk about this one later).`;
                        } else if (p.id === 'p1') {
                            return `A legend says that a long time ago, three springs were born in the Xistral Mountains and they felt the call of the sea. The three of them wanted to get to the sea as soon as possible because they would receive a great treasure, so they decided to set off together in order to share it. Thus, they started their journey together towards the sea, becoming the rivers Sor, Landro and Eume.

When they had already gone down for a long while and when the night was about to fall, the three rivers felt they were getting really tired and agreed on taking a short nap before continuing their journey. They promised that the first one to wake up would wake the others to continue their journey together towards the sea.

However, Antubel, the Celtic goddess of the sleeping waters, the shadows and the night, woke Sor up, tempting it to leave quietly towards the Cantabrian Sea without its mates. Sor, blinded by greed to arrive first, left quickly. When Sor had left, she did the same thing with the river Landro, which also fell into the temptation of the Celtic goddess and set off quietly to meet the Cantabrian Sea.

The next morning, when the Eume river woke up and saw that the other rivers had deceived it, he asked Endovélico (the ancient god of fire and light) for help and the latter helped it arrive as soon as possible. The river Eume, furious, followed immediately Endovélico's point of light towards the Artabrian gulf to avoid coinciding in the Cantabrian Sea with its disloyal rivals. He travelled quickly and tirelessly for 80km, jumping over everything he encountered.

The Eume was the first of the three to reach the sea, in Pontedeume, leaving behind beautiful landscapes such as "FRAGAS DO EUME" and receiving a great amount of fish and other extraordinary creatures as a reward. Among these creatures, we can highlight the mermaids, who are also protagonists of some of the stories in this route.`;
    } else if (p.id === 'p3') {
        return `The Roman findings discovered in Zopazos and other nearby places seem to indicate that during Celtic times there was already a kind of passage to communicate, with low tide, the numerous ringforts from one shore of the ría to the other.

A legend says that our ancestors, in ancient times, had stuck some stone passages covered with wood, to be able to cross on foot during low tide from one shore of the mouth of the Eume to the other. Crossing with high tide could only be done with a small boat.

But as a consequence of the deterioration of the stones and the wood, the frequent changes of the tide or the weight of the things they carried, the ancient inhabitants of the Eume banks frequently slipped, and after a clumsy dance trying to keep balance, they fell to the sea.

Since many couldn't swim and were taken away by the current, the Devil lay in wait to offer them his always self-interested help. Some lost their lives because they refused the satanic help, but there were many who exchanged their souls to get out of this dangerous situation (this is what happened to Minla some time later).`;
} else if (p.id === 'p4') {
    return `In the last quarter of the 14th century, the beautiful Minla, daughter of the first lord of Pontedeume, Fernán Pérez de Andrade, lived in the palace her parents had in the village. Every evening, after sunset, trying not to be seen, she went to the river bank to wait for Ledán, a strong and handsome farmer from Cabanas, who had a sailor friend that helped him cross by boat from the other bank of the river to be with his beloved one.

One evening there was a sudden storm and the waters in the river were really rough. The sailor didn't want to help him cross because he thought it was too dangerous, and Ledán, an expert swimmer, knowing that in the other bank Minla was waiting for him, decided to cross towards Pontedeume swimming.

However, despite his skills, he drowned in Cabanas. Minla, from Pontedeume, saw how her beloved one died in front of her very eyes and she could do nothing to help him. At this same moment, the devil, always considerate to the others' disgrace, approached the young lady and offered some help:

- If you give me your soul, you'll have the bridge finished by dawn.

The young lady, desperate to give Ledán one last kiss, accepted with the condition that the bridge needed to be finished before the black rooster in the Andrade house had sung. The devil worked all night and managed to build almost seventy one stone arches. At dawn, the Andrades' rooster sang and there was still one arch to be finished. But since the bridge was almost complete, Minla was able to cross and say goodbye to Ledán just by jumping above the unfinished arch; this way, she saved her soul and the devil was deceived.

Pontedeume's lord, when being informed about all this by his daughter, decided to finish the last arch in the bridge, which eventually joined the town with the other villages on the other bank of the river.

It is sometimes claimed, with subtle irony, that the name Pontedeume does not mean "bridge of the Eume" but "bridge of the devil".`;
} else if (p.id === 'p5') {
    return `The King Alfonso X the Wise granted Pontedeume a privilege in 1270: he allowed its inhabitants to fish freely at the sea without making them pay any taxation for what they had caught. Apart from his own protection, he also granted them one day a month to prepare the market and made them know everyone attending would be safe.

This boosted fishing and trade in Pontedeume, but it also brought extreme perils like the attacks of hostile ships or even pirates (like Roxín Roxal, about whom we'll talk later) entering the ría through the Artabrian gulf.

One of the most adventurous men in the village bought a ship and decided to try his luck outside Pontedeume. He promised his girlfriend - the most beautiful girl in the village - that he would soon return with money and they would get married, as they had always dreamt.

During his trip, he arrived at the Sal island and, when kissing its thick and white sand, he noticed it was very tasty. So he filled his ship with that salty sand and sold it around the world, becoming really rich with his business.

When he returned to Pontedeume, he had a luxurious house built and married his girlfriend. But soon after the wedding, the man left again in his ship to continue his commercial activities, while the wife stayed in the luxurious house they had built.

Back then, the person in charge of the village was a tyrant who lived in a defensive fortress located where nowadays we find the Andrade's turret. He was really jealous of that man, who had become the wealthiest of the village and the husband of the most beautiful woman.

For this reason, one night, taking advantage of the husband's absence, he decided to kidnap the wife and lock her up in his tower, where he tried to abuse her. But that night the moon gave way to a heavy storm which caused ferocious waves that demolished the room in the fortress where the nobleman was, causing his death.

When the man returned a month later and he was informed of how his dear wife had been freed, as a reward, he poured all the salt that was left in his island in the waters of the mouth of the river, the port in Pontedeume and the mouth of the Ares ría - since they were still fresh - for them to have a better flavour. That's why they are salty today.

In this same way, he wanted to stay in the village forever, to take care of his wife personally and enjoy being with her.`;
                        } else if (p.id === 'p9') {
                            return `According to ancient legends, many flooded cities remained buried under the sand, and the people that dared to enter their waters were at risk of being swallowed in order to increase the number of their inhabitants. Rumour has it in Pontedeume that something similar happened to the little French girl.

Above the mythical and legendary underwater city - the one we mentioned when talking about those 3 ladies that caused a sensation among local men - the iron bridge from Pontedeume was built at the beginning of the 20th century. During its building process this story took place:

A young French girl, who spent every summer holiday in August in Pontedeume, used to dive from the pier and swim to the rock of the Soldier. She was a skilful swimmer and the sailors mending the fishing nets in the harbour were impressed since her way of playing with the waves reminded them of a mermaid.

One day, while she was swimming under the iron bridge, she lost her most valuable belonging: a golden earring that her boyfriend from Pontedeume had given her. The jewel had not even reached the seafloor when she was already thinking of how to take it back. She went up the first pillar of the bridge, took a deep breath and dived into the sea. But it was useless.

The mythical underwater city had already caught a new treasure and was not giving it back. The little French girl fought as well trying not to be drawn, but even though she managed to escape, when she arrived at the surface she was dead. A sailor from the harbour immediately took a boat and went to grab her but only her dead body was left.

The little French girl was buried in Pontedeume, and in her grave they carved her face with the missing earring in marble.`;
                        } else if (p.id === 'p6') {
                            return `As the story goes in Pontedeume, the mermaid from the Mirandas has lived in the depths of the water in the Ares ría for many centuries. She is called like that because she lives close to those rocks even though she moves all around the Artabrian gulf. It is said that on some full-moon nights she approaches the stone bridge to enjoy the beauty of the town, always careful that no one will see her.

Mermaids are mythological beings that have the body - always naked - of a beautiful woman, with long hair and a fish tail instead of legs. They carry a mirror and a comb and they live in crystal palaces under the sea which are full of wealth. Moreover, they lure the sailors with their voice, then they seduce them and make them drown.

The mermaid from the Mirandas usually plays with dolphins and gets closer to octopuses, squid and sea basses that also swim in the Artabrian gulf. But she clearly knows she mustn't get close to men, since, in case of being discovered, she wouldn't be left alone.

Some nights of sea luminescence in August, a lot of young people go to the beach to swim under the light of the stars. One of those summer nights, at the end of the 13th century, a nobleman caught the mermaid sitting on a rock as he was bathing in Centroña. He was so impressed by her beauty that he asked her to come back the next day.

The nobleman could find no rest without her and asked her to go and live with him. So did the mermaid of the Mirandas, and he removed the scales in her tail one by one with loving care, patience and delicacy until two beautiful and long female legs could be seen. They fell in love and got married. They had children and lived happily ever after.

But when the husband died, the mermaid left her grown-up children and went back to live in the salty waters of the Ares ría, in the beautiful palace she had under the sea, near the Mirandas Islands. She was never seen again but, during certain nights of sea luminescence, some old sailors say that they have heard the most beautiful and sweet love song coming from the ocean floor, sung by the voice of the miserable mermaid.`;
} else if (p.id === 'p7') {
    return `There is a story in Pontedeume that says that, being lord Fernán Pérez de Andrade - or maybe Nuño Freire de Andrade - the governor of the castle, Pero López, famous for his cruelty, fell in love with a young woman called Elvira, a lady in waiting of the lady of Andrade, whom she served in the turret in Pontedeume. She rejected him because she already had a lover, Mauro, don Fernán's (or Nuño's) favourite page-boy. The rumours even said that the boy could be his son.

The governor couldn't stand Elvira choosing Mauro over him and ordered his only trust-worthy servant to kidnap the lovers and lock them up in a room in the tower of the castle of Andrade no one else could access.

The lords of Pontedeume, alarmed by their disappearance, spent several days looking for them in the village, the parishes, the forests in the Fragas del Eume and the forests of Breamo… but all their efforts ended up in failure.

The governor convinced don Fernán - or don Nuño - that he had information that let him claim that the lovers had eloped together. And even though they sometimes went to the rooftop of the turret with the hope they would come back, they believed Pero López's story and accepted that they would never see them again.

The two lovers spent many months chained in that dark and solitary cell where they had been locked, and the governor's servant, who was mute, took them food every day. The only comfort for the lovers was that they were together.

One day, when the loyal servant brought them food, brave Mauro took advantage of the fact that he had bent to leave the plate on the floor and hit him so hard that he was mortally wounded. He was able to get his keys and free himself, but while he was about to unchain Elvira, the servant ran away with the cell keys, leaving them locked up.

The servant told his master everything that had happened using signs and, when he finished the story, he died. The governor, in revenge, decided to let the lovers die of starvation. After some months, in his deathbed, he confessed to the lord of Pontedeume what he had plotted against Mauro and Elvira and, when they arrived at the cell in the castle of Andrade, they found their corpses hugging.`;
} else if (p.id === 'p8') {
    return `After King Alfonso X the Wiser had granted in 1270 the privilege that boosted the settlement and creation of Pontedeume, the village got fortified in order to face the attacks of invasive ships or even pirates, who arrived to the ría through the Artabrian gulf. This was also the reason why the fortress of the castle of Andrade (in Nogueirosa) was built.

During the times of Fernán Pérez de Andrade, some pirates arrived at Pontedeume pretending to loot the village. One of them, red-haired and with skin white as the snow, stole as well the heart of a maid who lived in the palace of the Andrade and he had a passionate love affair with her.

However, happiness did not last since a few days later the pirate left with his fellows through the Ares ría, and the maid gave birth nine months later to a beautiful red-haired baby with white skin like his father's, of whom they never knew anything else.

The maid, being kind and loyal to the Andrade lords, continued serving in their palace. Her son, who she named Roxín Roxal, inherited his father's strength and courage and his mother's loyalty. When he turned 15, he was called to serve as a page-boy in the castle on top of Leboreiro rock, where he established his home.

At that time, in the first quarter of the 15th century, there was another lord in Pontedeume, Don Nuño Freire de Andrade, nicknamed "the evil one" by his vassals, who, tired of his abuses, organized the first Irmandiño revolt. Don Nuño had two sons and lived with his only daughter, Tareixa, in his palace in Pontedeume.

Tareixa was a very cheerful and beautiful girl. She loved going for walks, riding a horse or sailing through the Eume river and its forest, Breamo Mountain or the beaches in the area. But, being also a little bit irresponsible and rebellious, his father asked Roxín Roxal to take care of her and protect her since the boy was considered to be very intelligent and brave, and also worthy of his trust and sympathy.

The page-boy went with Tareixa wherever she went to and, little by little, a friendship was born between them which later on gave way to love. Roxín Roxal, who was always cheerful and happy, started to feel sad and melancholic when Tareixa was not around; but due to the respect he had for Don Nuño, he couldn't dare to confess his love for her.

However, the girl noticed the melancholy in his eyes and understood he was crazy in love with her so she confessed that she loved him in return. But their love story didn't last long because, when the lord in Pontedeume discovered it, he forbade the boy to see his daughter again and expelled him to the surrounding area of the Andrade castle.

Don Nuño, despite feeling affection for the boy, could not stand Roxín Roxal marrying his daughter since the boy came from a humble background. He had already arranged the marriage between his daughter and Enrique de Osorio, a man similar in social position to the Andrades.

Roxín Roxal obeyed his lord's orders diligently and he decided to compensate the boy for his loyalty with a valuable golden dagger with the initial R.R. engraved.

Time went by, and Enrique and Tareixa got married. Nuño continued ruling the village and Tareixa never knew anything else from Roxín Roxal.

During that time, a terrible boar - the largest ever seen - started to attack the lands of the Andrade. Tired of the peasants' complaints, Nuño organized a hunt, led by his son-in-law Enrique and his daughter Tareixa. They cornered the boar, which was already wounded and furious, and it went down the mountain until it reached the bridge, where they were waiting for it. Enrique de Osorio, having it at range, threw an arrow and the animal, enraged, attacked Tareixa with cruelty, wounding her mortally. His coward husband, instead of defending her, jumped into the river to save his own life.

A few days later, in that same bridge, the dead body of the boar appeared, with the dagger that Nuño had given Roxín Roxal in its throat. Only the lord of Andrade knew that it could belong to no one else. In that same moment, he realised that forbidding the marriage between his daughter and his vassal had been a huge mistake, since the latter, even though he was a commoner, would have undoubtedly defended his daughter better than the noble don Enrique.`;
                        } else {
                            return 'Story in English to be written by 9th grade students.';
                        }
                    })(),

                              subtitle: p.id === 'p1' ? 'Course vers la mer' : p.id === 'p2' ? 'Le sortilège noyé' : p.id === 'p3' ? 'Surveillés par le diable' : p.id === 'p4' ? 'Le pont du diable' : p.id === 'p5' ? 'Amour et sel dans la ria' : p.id === 'p6' ? 'L\'amour entre la sirène et le noble' : p.id === 'p9' ? 'La boucle d\'oreille perdue' : p.id === 'p7' ? 'Amour enchaîné' : 'Le pirate Roxín',
                    story: (() => {
                        if (p.id === 'p1') {
                            return `La légende raconte qu'il y a très longtemps, trois sources sont nées dans la "Serra do Xistral" et ont ressenti l'appel de la mer. Toutes les trois voulaient aller à la mer le plus tôt possible car, de cette façon, elles recevraient un grand trésor, alors elles décidèrent de partir ensemble pour le partager. Ainsi, les trois commencèrent leur voyage ensemble vers la mer, en devenant les rivières Sor, Lando et Eume.

Alors qu'elles avaient déjà fait une bonne descente et que la nuit commençait à tomber, les trois rivières sentirent que leurs forces manquaient et ils convinrent qu'elles feraient une petite sieste avant de reprendre leur promenade et que la première à se réveiller avertirait les autres pour continuer le voyage ensemble vers la mer.

Néanmoins, Antubel, la déesse celtique des eaux endormies, des ombres et de la nuit, apparut et réveilla Sor, en lui disant de partir seule, tranquillement sans ses compagnons vers la mer Cantabrique. Et Sor, aveuglé par l'avidité d'atteindre la ligne d'arrivée en premier lieu, partit sans attendre. Lorsque la rivière Sor partit, Antubel fit de même avec Landro qui tomba également dans la tentation de la déesse celtique et quitta Silandeiro pour embrasser la mer Cantabrique.

Le lendemain matin, lorsque l'Eume se réveilla et vit que les autres rivières l'avaient trompé et étaient déjà parties, il demanda l'aide d'Endovelicus, le dieu ancestral du feu et de la lumière, et celui-ci l'aida à arriver le plus tôt possible. L'Eume, enragé, suivit la lumière d'Endovélico vers le Golfe d'Artabro, de manière rapide et sans repos, pendant 80 km, sautant par-dessus tout ce qui se présentait devant lui.

L'Eume a été le premier des trois à atteindre la mer, d'atteindre Pontedeume, en laissant derrière lui de beaux paysages comme les Fragas do Eume et recevant ainsi comme trésor beaucoup de poissons et de créatures extraordinaires, parmi lesquelles nous pouvons trouver les sirènes, qui seront également les protagonistes de cette itinéraire.`;
                        } else if (p.id === 'p2') {
                            return `Il y a très longtemps, à l'embouchure de l'Eume, du côté du "Monte Breamo", nos ancêtres avaient construit une ville qui s'enrichissait chaque jour, grâce à son agriculture et son élevage vigoureux et à la pêche abondante des voisins.

Un jour, elles arrivèrent dans l'ancien et prospère village, trois belles dames transparentes aux cheveux blonds qui se coiffaient avec trois peignes dorés précieux et magiques et qui ensorcelèrent de nombreux hommes locaux. C'étaient des êtres surnaturels, qui faisaient rire les jeunes hommes les plus intelligents de la ville.

Les trois dames transparentes ne montraient leur beauté qu'après le coucher du soleil et les hommes affluaient nuit après nuit dans leur palais où se célébraient de véritables orgies et bacchanales. Les luttes étaient constantes entre eux et la prospérité du village était déjà en danger.

Les membres du Conseil des Anciens étaient sérieusement inquiets, alors ils parlèrent au druide, qui leur dit que ces demoiselles étaient des fées enchantées qui ne feraient qu'apporter la destruction de la ville. Il ordonna au peuple de se rassembler sous les forts et d'y rester trois jours. Puis il grimpa au sommet du mont Breamo et jeta un sort. Un peu plus tard, il s'est également réfugié dans un fort et immédiatement il a commencé à pleuvoir et cette pluie ne s'est arrêté que trois jours plus tard.

La ville a été inondée et les jeunes gens qui n'ont pas tenu compte de l'avertissement du Conseil des Anciens se sont noyés. Seuls ceux qui se sont cachés dans le fort avec leurs familles ont sauvé la vie.

En fait, il n'y a rien de certain sur ces trois femmes transparentes, même si certains disent qu'elles sont devenues des sirènes et n'ont pas quitté notre village ; l'une d'entre elles vit au fond de la mer, près de Macuca ; une autre, dans le Mourón, et la troisième dans la zone des Mirandas (dont nous parlerons plus tard).`;
                        } else if (p.id === 'p3') {
                            return `Les découvertes romaines trouvées à Zopazos et dans d'autres lieux voisins semblent indiquer que déjà à l'époque des châteaux, il existait une sorte de pont pour communiquer, à marée basse, les populations d'un et d'autre côté.

                        } else if (p.id === 'p4') {
                            return `Dans le dernier quart du XIVe siècle, la belle Minla, fille du premier seigneur de Pontedeume, Fernán Pérez de Andrade, vivait dans le palais que ses parents possédaient dans la ville et tous les jours, au coucher du soleil, pour ne pas être vue, elle se rendait au bord de la rivière pour attendre Ledán, un paysan fort et robuste de Cabanas qui traversait la rivière dans le bateau d'un ami marin pour être avec sa bien-aimée.

                        } else if (p.id === 'p5') {
